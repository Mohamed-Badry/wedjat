# Project Wedjat — Docker Compose Dev Stack
#
# Credentials & config are read from .env (auto-loaded by Compose).
# Copy .env.example → .env and fill in your values.
# The ${VAR:-default} syntax provides fallbacks so `docker compose up`
# works even without an .env file.
#
# Development workflow:
#   docker compose watch        — live sync + auto-rebuild on dep changes
#   docker compose up --build   — one-shot build + run

services:
  broker:
    profiles: ["dev-cloud", "dev-edge", "cloud", "edge"]
    build: ./mosquitto
    container_name: wedjat_broker
    ports:
      - "127.0.0.1:9001:9001"
    environment:
      # WARNING: Fallbacks (wedjat/secretpassword) are for local dev ONLY.
      - MQTT_USERNAME=${MQTT_USERNAME:-wedjat}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-secretpassword}
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  db:
    profiles: ["dev-cloud", "cloud"]
    image: timescale/timescaledb:2.26.4-pg15
    container_name: wedjat_db
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      # WARNING: Fallbacks are for local dev ONLY. Set in .env for production.
      POSTGRES_USER: ${POSTGRES_USER:-wedjat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wedjat_pass}
      POSTGRES_DB: ${POSTGRES_DB:-wedjat_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wedjat} -d ${POSTGRES_DB:-wedjat_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    profiles: ["dev-cloud", "cloud"]
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: wedjat_backend
    command: sh -c "cd /app && python src/api/safe_migrate.py && uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wedjat}:${POSTGRES_PASSWORD:-wedjat_pass}@db:5432/${POSTGRES_DB:-wedjat_db}
      MQTT_BROKER_URL: broker
      MQTT_BROKER_PORT: "1883"
      MQTT_USERNAME: ${MQTT_USERNAME:-wedjat}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-secretpassword}
    volumes:
      - ./src/api:/app/src/api
      - ./src/gr_sat:/app/src/gr_sat
      - ./models:/app/models:ro
      - ./data:/app/data
      - ./alembic.ini:/app/alembic.ini:ro
      - ./db/migrations:/app/db/migrations
      - ./scripts:/app/scripts:ro
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_started
    restart: unless-stopped
    develop:
      watch:
        # Source changes: already bind-mounted, uvicorn --reload picks them up.
        # Dep changes: full rebuild needed.
        - action: rebuild
          path: src/api/requirements.txt
        - action: rebuild
          path: src/api/Dockerfile
        - action: rebuild
          path: pyproject.toml

  frontend:
    profiles: ["dev-cloud"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: wedjat_frontend
    command: bun run dev --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped
    develop:
      watch:
        # Sync source files instantly so Vite HMR can hot-reload without container rebuilds
        - action: sync
          path: frontend/src
          target: /app/src
        - action: sync
          path: frontend/static
          target: /app/static
        - action: rebuild
          path: frontend/package.json
        - action: rebuild
          path: frontend/bun.lock
        - action: rebuild
          path: frontend/Dockerfile

  frontend-prod:
    profiles: ["cloud"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wedjat_frontend_prod
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped

  simulator:
    profiles: ["dev-cloud"]
    build:
      context: .
      dockerfile: src/simulator/Dockerfile
    container_name: wedjat_simulator
    volumes:
      - ./src/simulator:/app/src/simulator
      - ./src/gr_sat:/app/src/gr_sat
      - ./data/raw:/app/data/raw
    environment:
      MQTT_BROKER_URL: broker
      MQTT_BROKER_PORT: "1883"
      # WARNING: Fallbacks are for local dev ONLY.
      MQTT_USERNAME: ${MQTT_USERNAME:-wedjat}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-secretpassword}
      PYTHONDONTWRITEBYTECODE: 1
    depends_on:
      - broker
    restart: unless-stopped
    develop:
      watch:
        # No hot-reload — sync + restart the process on source changes.
        - action: sync+restart
          path: src/simulator
          target: /app/src/simulator
        - action: sync+restart
          path: src/gr_sat
          target: /app/src/gr_sat
        - action: rebuild
          path: src/simulator/requirements.txt
        - action: rebuild
          path: src/simulator/Dockerfile

  scheduler:
    profiles: ["dev-cloud", "cloud"]
    build:
      context: .
      dockerfile: src/scheduler/Dockerfile
    container_name: wedjat_scheduler
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      API_URL: http://backend:8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-wedjat}:${POSTGRES_PASSWORD:-wedjat_pass}@db:5432/${POSTGRES_DB:-wedjat_db}
    depends_on:
      - backend
    restart: unless-stopped

  demodulator:
    profiles: ["dev-edge", "edge"]
    build:
      context: .
      dockerfile: src/demodulator/Dockerfile
    container_name: wedjat_demodulator
    volumes:
      - ./data/iq:/app/data/iq
      - ./data/raw:/app/data/raw
    environment:
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-broker}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      MQTT_USE_WSS: ${MQTT_USE_WSS:-false}
      MQTT_USE_TLS: ${MQTT_USE_TLS:-false}
      MQTT_USERNAME: ${MQTT_USERNAME:-wedjat}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-secretpassword}
      ZMQ_ENDPOINT: ${ZMQ_ENDPOINT:-tcp://host.docker.internal:5555}
      WATCH_DIR: /app/data/iq
      STATION_ID: ${STATION_ID:-edge_station_sdr}
      TARGET_NORAD_ID: ${TARGET_NORAD_ID:-43880}
      PYTHONDONTWRITEBYTECODE: 1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Demodulator connects directly to the cloud broker over WebSockets, so no depends_on: broker needed
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: src/demodulator
          target: /app/src/demodulator
        - action: sync+restart
          path: src/gr_sat
          target: /app/src/gr_sat
        - action: rebuild
          path: src/demodulator/Dockerfile

  autotrack:
    profiles: ["dev-edge", "edge"]
    build:
      context: .
      dockerfile: src/scheduler/Dockerfile
    container_name: wedjat_autotrack
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./data:/app/data
    environment:
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-broker}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      MQTT_USE_WSS: ${MQTT_USE_WSS:-false}
      MQTT_USE_TLS: ${MQTT_USE_TLS:-false}
      MQTT_USERNAME: ${MQTT_USERNAME:-wedjat}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-secretpassword}
      STATION_ID: ${STATION_ID:-edge_station_sdr}
      GS_LAT: ${GS_LAT:-34.0522}
      GS_LON: ${GS_LON:-118.2437}
      GS_ELEV: ${GS_ELEV:-0.0}
    working_dir: /app
    command: ["python", "scripts/edge_autotrack.py"]
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: scripts/edge_autotrack.py
          target: /app/scripts/edge_autotrack.py
        - action: sync+restart
          path: src/api/pass_predictor.py
          target: /app/src/api/pass_predictor.py

volumes:
  timescaledb_data:
  mosquitto_data:
  mosquitto_log:
  frontend_node_modules:
