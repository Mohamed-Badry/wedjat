# Project Watchdog — Docker Compose Dev Stack
#
# Credentials & config are read from .env (auto-loaded by Compose).
# Copy .env.example → .env and fill in your values.
# The ${VAR:-default} syntax provides fallbacks so `docker compose up`
# works even without an .env file.
#
# Development workflow:
#   docker compose watch        — live sync + auto-rebuild on dep changes
#   docker compose up --build   — one-shot build + run

services:
  broker:
    image: eclipse-mosquitto:2.1.2-alpine
    container_name: watchdog_broker
    ports:
      - "1883:1883"
    environment:
      # WARNING: Fallbacks (watchdog/secretpassword) are for local dev ONLY.
      - MQTT_USERNAME=${MQTT_USERNAME:-watchdog}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-secretpassword}
    entrypoint: ["/mosquitto/entrypoint.sh"]
    volumes:
      - ./mosquitto/entrypoint.sh:/mosquitto/entrypoint.sh:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  db:
    image: timescale/timescaledb:2.26.4-pg15
    container_name: watchdog_db
    ports:
      - "5432:5432"
    environment:
      # WARNING: Fallbacks are for local dev ONLY. Set in .env for production.
      POSTGRES_USER: ${POSTGRES_USER:-watchdog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watchdog_pass}
      POSTGRES_DB: ${POSTGRES_DB:-watchdog_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watchdog} -d ${POSTGRES_DB:-watchdog_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: watchdog_backend
    command: sh -c "cd /app && alembic upgrade head && uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-watchdog}:${POSTGRES_PASSWORD:-watchdog_pass}@db:5432/${POSTGRES_DB:-watchdog_db}
      MQTT_BROKER_URL: broker
      MQTT_BROKER_PORT: "1883"
      # WARNING: Fallbacks are for local dev ONLY.
      MQTT_USERNAME: ${MQTT_USERNAME:-watchdog}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-secretpassword}
    volumes:
      - ./src/api:/app/src/api
      - ./src/gr_sat:/app/src/gr_sat
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./alembic.ini:/app/alembic.ini:ro
      - ./db/migrations:/app/db/migrations
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_started
    restart: unless-stopped
    develop:
      watch:
        # Source changes: already bind-mounted, uvicorn --reload picks them up.
        # Dep changes: full rebuild needed.
        - action: rebuild
          path: src/api/requirements.txt
        - action: rebuild
          path: src/api/Dockerfile
        - action: rebuild
          path: pyproject.toml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: watchdog_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped
    develop:
      watch:
        # Source changes: bind-mounted, Vite HMR handles them.
        # Dep / config changes: need a rebuild to re-run bun install.
        - action: rebuild
          path: frontend/package.json
        - action: rebuild
          path: frontend/bun.lock
        - action: rebuild
          path: frontend/Dockerfile

  simulator:
    build:
      context: .
      dockerfile: src/simulator/Dockerfile
    container_name: watchdog_simulator
    volumes:
      - ./src/simulator:/app/src/simulator
      - ./src/gr_sat:/app/src/gr_sat
      - ./data/raw:/app/data/raw
    environment:
      MQTT_BROKER_URL: broker
      MQTT_BROKER_PORT: "1883"
      # WARNING: Fallbacks are for local dev ONLY.
      MQTT_USERNAME: ${MQTT_USERNAME:-watchdog}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-secretpassword}
    depends_on:
      - broker
    restart: unless-stopped
    develop:
      watch:
        # No hot-reload — sync + restart the process on source changes.
        - action: sync+restart
          path: src/simulator
          target: /app/src/simulator
        - action: sync+restart
          path: src/gr_sat
          target: /app/src/gr_sat
        - action: rebuild
          path: src/simulator/requirements.txt
        - action: rebuild
          path: src/simulator/Dockerfile

  scheduler:
    build:
      context: .
      dockerfile: src/scheduler/Dockerfile
    container_name: watchdog_scheduler
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./models:/app/models
    environment:
      API_URL: http://backend:8000
      API_KEY: dev_master_key
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  timescaledb_data:
  mosquitto_data:
  mosquitto_log:
  frontend_node_modules:
